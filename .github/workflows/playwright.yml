name: Playwright tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SMOKE_ONLY: '1'
      # Each app under test carries its own base URL in apps/<name>/app.config.ts.
      # Override per app with <NAME>_BASE_URL, e.g. SAUCEDEMO_BASE_URL.
      # Optional: yosemitecinema member-account scenarios need these (set them as repo secrets).
      TEST_MEMBER_EMAIL: ${{ secrets.TEST_MEMBER_EMAIL }}
      TEST_MEMBER_PASSWORD: ${{ secrets.TEST_MEMBER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright spec smoke
        run: npm test

      - name: Run Playwright BDD smoke
        run: npm run test:bdd

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          path: |
            playwright-report
            cucumber-report
            test-results
          retention-days: 7
          if-no-files-found: ignore
